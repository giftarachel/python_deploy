<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CALC</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
    }

    .calc-wrap {
      width: 360px;
      background: #0d0d0d;
      border-radius: 0;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      user-select: none;
    }

    /* TITLE BAR */
    .titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0d0d0d;
      padding: 10px 14px 6px;
    }
    .titlebar-left {
      display: flex; align-items: center; gap: 8px;
      color: #e94560; font-size: 13px; font-weight: 700; letter-spacing: 1px;
    }
    .titlebar-left span { color: #e94560; font-size: 10px; }
    .titlebar-right { display: flex; gap: 6px; }
    .wbtn {
      width: 28px; height: 22px; border: none; border-radius: 4px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .wbtn.min { background: #f5a623; color: #000; }
    .wbtn.cls { background: #e94560; color: #fff; }

    /* CONTROLS */
    .controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px 10px;
      background: #0d0d0d;
    }
    .dots { display: flex; gap: 8px; align-items: center; }
    .dot {
      width: 16px; height: 16px; border-radius: 50%;
      cursor: pointer; border: 2px solid transparent;
      transition: transform 0.15s;
    }
    .dot:hover { transform: scale(1.2); }
    .dot.active { border-color: #fff; }

    .right-controls { display: flex; align-items: center; gap: 10px; }

    /* STD/SCI pill */
    .mode-pill {
      display: flex; align-items: center;
      background: #1a1a2e; border-radius: 20px;
      padding: 3px; gap: 2px; cursor: pointer;
    }
    .mode-pill span {
      padding: 4px 12px; border-radius: 16px;
      font-size: 11px; font-weight: 700; color: #555;
      transition: all 0.2s;
    }
    .mode-pill span.active { background: #e94560; color: #fff; }

    .hist-btn {
      background: none; border: none; color: #555;
      font-size: 18px; cursor: pointer; padding: 4px;
    }
    .hist-btn:hover { color: #e94560; }

    /* DISPLAY */
    .display {
      background: #111;
      padding: 10px 20px 16px;
      min-height: 110px;
      display: flex; flex-direction: column; justify-content: flex-end;
    }
    .expr-line {
      text-align: right; font-size: 12px;
      color: #444; font-family: 'JetBrains Mono', monospace;
      min-height: 18px; margin-bottom: 4px;
    }
    .main-line {
      text-align: right;
      font-family: 'JetBrains Mono', monospace;
      font-size: 52px; font-weight: 700;
      color: #fff; line-height: 1;
      transition: font-size 0.1s;
      word-break: break-all;
    }
    .cursor-line {
      height: 3px; background: #e94560;
      margin-top: 10px; border-radius: 2px;
      animation: blink 1.1s infinite;
    }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

    /* KEYPAD */
    .keypad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 3px;
      padding: 3px;
      background: #0d0d0d;
    }
    .keypad.sci-mode { grid-template-rows: repeat(7, 1fr); }

    .btn {
      height: 72px;
      border: none; border-radius: 4px;
      font-size: 18px; font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: filter 0.1s, transform 0.08s;
      font-family: 'Inter', sans-serif;
      position: relative; overflow: hidden;
    }
    .btn:active { transform: scale(0.94); filter: brightness(1.3); }

    .btn.num   { background: #1c1c1c; color: #fff; }
    .btn.op    { background: #181830; color: #e94560; }
    .btn.eq    { background: #e94560; color: #fff; font-size: 22px; }
    .btn.clear { background: #1c1c1c; color: #fff; }
    .btn.sci   { background: #14142a; color: #e94560; font-size: 14px; }

    .btn:hover { filter: brightness(1.18); }

    /* Ripple */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(233,69,96,0.35);
      transform: scale(0); animation: ripple-anim 0.4s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

    /* HISTORY PANEL */
    .history-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      z-index: 50; display: none; align-items: center; justify-content: center;
    }
    .history-overlay.open { display: flex; }
    .history-panel {
      background: #0a0a0a; border: 1px solid #252525;
      border-radius: 12px; width: 300px; max-height: 500px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .hist-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; border-bottom: 1px solid #222;
    }
    .hist-header span { color: #e94560; font-size: 12px; font-weight: 700; letter-spacing: 1px; }
    .hist-close { background: none; border: none; color: #555; font-size: 16px; cursor: pointer; }
    .hist-search {
      margin: 10px 12px;
      background: #181818; border: 1px solid #252525;
      color: #fff; padding: 8px 12px; border-radius: 8px;
      font-size: 13px; outline: none; width: calc(100% - 24px);
    }
    .hist-list { overflow-y: auto; flex: 1; padding: 8px; }
    .hist-item {
      background: #181818; border-radius: 8px;
      padding: 10px 12px; margin-bottom: 6px; cursor: pointer;
      transition: background 0.15s;
    }
    .hist-item:hover { background: #252525; }
    .hist-item .hi-expr { font-size: 11px; color: #555; margin-bottom: 4px; }
    .hist-item .hi-result { font-size: 20px; font-weight: 700; color: #fff; font-family: 'JetBrains Mono', monospace; }
    .hist-item .hi-time { font-size: 10px; color: #444; float: right; }
    .hist-empty { text-align: center; color: #444; padding: 30px; font-size: 13px; }
    .hist-clear { text-align: right; padding: 6px 16px; }
    .hist-clear button { background: none; border: none; color: #444; font-size: 11px; cursor: pointer; }
    .hist-clear button:hover { color: #e94560; }

    /* BACK BUTTON */
    .back-btn {
      display: block; text-align: center;
      background: #181818; color: #e94560;
      padding: 12px; font-size: 13px; font-weight: 600;
      text-decoration: none; letter-spacing: 0.5px;
      transition: background 0.2s;
    }
    .back-btn:hover { background: #222; }

    /* THEME COLORS */
    .t-midnight { --eq:#e94560; --op-bg:#181830; --op-fg:#e94560; --accent:#e94560; }
    .t-aurora   { --eq:#00d4aa; --op-bg:#0a1e30; --op-fg:#00d4aa; --accent:#00d4aa; }
    .t-sakura   { --eq:#e8618c; --op-bg:#ffe0eb; --op-fg:#e8618c; --accent:#e8618c; }
    .t-obsidian { --eq:#f5a623; --op-bg:#242424; --op-fg:#f5a623; --accent:#f5a623; }
    .t-nordic   { --eq:#5e81ac; --op-bg:#353d4e; --op-fg:#88c0d0; --accent:#88c0d0; }
  </style>
</head>
<body>
<div class="calc-wrap" id="calcWrap">

  <!-- Title Bar -->
  <div class="titlebar">
    <div class="titlebar-left"><span>◆</span> CALC</div>
    <div class="titlebar-right">
      <button class="wbtn min" onclick="window.history.back()">−</button>
      <button class="wbtn cls" onclick="window.location.href='index.html'">✕</button>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="dots" id="dots"></div>
    <div class="right-controls">
      <div class="mode-pill" onclick="toggleMode()">
        <span id="std-lbl" class="active">STD</span>
        <span id="sci-lbl">SCI</span>
      </div>
      <button class="hist-btn" onclick="toggleHistory()" title="History">⏱</button>
    </div>
  </div>

  <!-- Display -->
  <div class="display" id="display">
    <div class="expr-line" id="exprLine"></div>
    <div class="main-line" id="mainLine">0</div>
    <div class="cursor-line"></div>
  </div>

  <!-- Keypad -->
  <div class="keypad" id="keypad"></div>

  <!-- Back -->
  <a href="index.html" class="back-btn">← Back to SuspensionSim</a>
</div>

<!-- History Panel -->
<div class="history-overlay" id="histOverlay" onclick="closeHistIfOutside(event)">
  <div class="history-panel">
    <div class="hist-header">
      <span>⏱ HISTORY</span>
      <button class="hist-close" onclick="toggleHistory()">✕</button>
    </div>
    <input class="hist-search" id="histSearch" placeholder="⌕  search history…" oninput="renderHistory()" />
    <div class="hist-clear"><button onclick="clearHistory()">Clear all</button></div>
    <div class="hist-list" id="histList"></div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────
let expr = "", input = "0", resultShown = false, sciMode = false;
let themeIdx = 0, history = [];

const THEMES = [
  { name:"Midnight", bg:"#0d0d0d", disp:"#111111", num:"#1c1c1c", op:"#181830", opFg:"#e94560", eq:"#e94560", clear:"#1c1c1c", sci:"#14142a", sciFg:"#e94560", text:"#ffffff", sub:"#444444", accent:"#e94560", dot:"#e94560" },
  { name:"Aurora",   bg:"#080e1a", disp:"#080e1a", num:"#111c2e", op:"#0a1e30", opFg:"#00d4aa", eq:"#00d4aa", clear:"#141f35", sci:"#0a1820", sciFg:"#00d4aa", text:"#d8f5ff", sub:"#3a7090", accent:"#00d4aa", dot:"#00d4aa" },
  { name:"Sakura",   bg:"#fdf0f5", disp:"#fce8f0", num:"#ffffff", op:"#ffe0eb", opFg:"#e8618c", eq:"#e8618c", clear:"#f5d0df", sci:"#ffd8e8", sciFg:"#e8618c", text:"#2d1520", sub:"#c090a8", accent:"#e8618c", dot:"#e8618c" },
  { name:"Obsidian", bg:"#181818", disp:"#181818", num:"#2a2a2a", op:"#242424", opFg:"#f5a623", eq:"#f5a623", clear:"#303030", sci:"#202020", sciFg:"#f5a623", text:"#f0e6d0", sub:"#705030", accent:"#f5a623", dot:"#f5a623" },
  { name:"Nordic",   bg:"#2e3440", disp:"#272e3c", num:"#3e4757", op:"#353d4e", opFg:"#88c0d0", eq:"#5e81ac", clear:"#434c5e", sci:"#313a4a", sciFg:"#88c0d0", text:"#eceff4", sub:"#607080", accent:"#88c0d0", dot:"#88c0d0" },
];
const DOT_COLORS = ["#e94560","#00d4aa","#e8618c","#f5a623","#88c0d0"];

// ── Keypad layouts ─────────────────────────────────
const STD_KEYS = [
  ["AC","clear"],["C","clear"],["%","op"],["÷","op"],
  ["7","num"],["8","num"],["9","num"],["×","op"],
  ["4","num"],["5","num"],["6","num"],["−","op"],
  ["1","num"],["2","num"],["3","num"],["+","op"],
  ["±","num"],["0","num"],[".","num"],["=","eq"],
];
const SCI_KEYS = [
  ["sin","sci"],["cos","sci"],["tan","sci"],["log","sci"],
  ["√","sci"],["x²","sci"],["xʸ","sci"],["π","sci"],
  ...STD_KEYS
];

// ── Init ───────────────────────────────────────────
function init() {
  buildDots();
  applyTheme();
  buildKeypad();
  document.addEventListener("keydown", handleKey);
}

// ── Dots ───────────────────────────────────────────
function buildDots() {
  const c = document.getElementById("dots");
  c.innerHTML = "";
  THEMES.forEach((t, i) => {
    const d = document.createElement("div");
    d.className = "dot" + (i === themeIdx ? " active" : "");
    d.style.background = DOT_COLORS[i];
    d.style.borderColor = i === themeIdx ? "#fff" : "transparent";
    d.onclick = () => { themeIdx = i; applyTheme(); buildDots(); buildKeypad(); };
    c.appendChild(d);
  });
}

// ── Theme ──────────────────────────────────────────
function applyTheme() {
  const t = THEMES[themeIdx];
  const w = document.getElementById("calcWrap");
  w.style.background = t.bg;
  document.querySelector(".titlebar").style.background = t.bg;
  document.querySelector(".controls").style.background = t.bg;
  document.getElementById("display").style.background = t.disp;
  document.querySelector(".expr-line").style.color = t.sub;
  document.getElementById("mainLine").style.color = t.text;
  document.querySelector(".cursor-line").style.background = t.accent;
  document.querySelector(".mode-pill").style.background = t.num;
  document.querySelector(".titlebar-left").style.color = t.accent;
  document.querySelector(".back-btn").style.color = t.accent;
  // update std/sci labels
  document.getElementById("std-lbl").style.background = !sciMode ? t.eq : "transparent";
  document.getElementById("sci-lbl").style.background = sciMode ? t.eq : "transparent";
  document.getElementById("std-lbl").style.color = !sciMode ? "#fff" : t.sub;
  document.getElementById("sci-lbl").style.color = sciMode ? "#fff" : t.sub;
}

// ── Keypad ─────────────────────────────────────────
function buildKeypad() {
  const t = THEMES[themeIdx];
  const kp = document.getElementById("keypad");
  kp.innerHTML = "";
  const keys = sciMode ? SCI_KEYS : STD_KEYS;
  keys.forEach(([lbl, kind]) => {
    const btn = document.createElement("button");
    btn.className = `btn ${kind}`;
    btn.textContent = lbl;
    // theme colors
    if (kind === "num")   { btn.style.background = t.num;   btn.style.color = t.text; }
    if (kind === "op")    { btn.style.background = t.op;    btn.style.color = t.opFg; }
    if (kind === "eq")    { btn.style.background = t.eq;    btn.style.color = "#fff"; }
    if (kind === "clear") { btn.style.background = t.clear; btn.style.color = t.text; }
    if (kind === "sci")   { btn.style.background = t.sci;   btn.style.color = t.sciFg; btn.style.fontSize = "13px"; }
    if (sciMode) btn.style.height = "58px";
    btn.addEventListener("click", (e) => { ripple(btn, e); handleBtn(lbl, kind); });
    kp.appendChild(btn);
  });
}

// ── Ripple ─────────────────────────────────────────
function ripple(btn, e) {
  const r = document.createElement("span");
  r.className = "ripple";
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  r.style.width = r.style.height = size + "px";
  r.style.left = (e.clientX - rect.left - size/2) + "px";
  r.style.top  = (e.clientY - rect.top  - size/2) + "px";
  btn.appendChild(r);
  setTimeout(() => r.remove(), 400);
}

// ── Button logic ───────────────────────────────────
function handleBtn(lbl, kind) {
  const map = {
    "AC": allClear, "C": backspace, "=": evaluate,
    "±": negate, "%": percent,
    "÷": () => op("÷"), "×": () => op("×"),
    "−": () => op("−"), "+": () => op("+"),
    "xʸ": () => op("^"),
    "sin": () => sci("sin"), "cos": () => sci("cos"),
    "tan": () => sci("tan"), "log": () => sci("log"),
    "√": () => sci("√"), "x²": () => sci("x²"),
    "π": pi,
  };
  if (map[lbl]) map[lbl]();
  else digit(lbl);
}

function digit(d) {
  if (resultShown) { input = d === "." ? "0." : d; expr = ""; resultShown = false; }
  else {
    if (input === "0" && d !== ".") input = d;
    else { if (d === "." && input.includes(".")) return; input += d; }
  }
  updateDisplay();
}

function op(o) {
  push();
  const map = {"÷":"/","×":"*","−":"-","+":"+","^":"**"};
  expr += map[o] || o;
  input = "0"; resultShown = false;
  document.getElementById("exprLine").textContent = dispExpr(expr);
  updateDisplay();
}

function push() { if (input !== "0" && input !== "") expr += input; }

function evaluate() {
  push();
  if (!expr) return;
  try {
    let result = Function('"use strict"; return (' + expr + ')')();
    result = Math.round(result * 1e10) / 1e10;
    const rs = Number.isInteger(result) ? String(result) : String(result);
    const de = dispExpr(expr);
    addHistory(de, rs);
    document.getElementById("exprLine").textContent = de + "  =";
    input = rs; expr = rs; resultShown = true;
    pulse();
  } catch(e) {
    document.getElementById("mainLine").textContent = "Error";
    shake(); expr = ""; input = "0"; return;
  }
  updateDisplay();
}

function dispExpr(e) { return e.replace(/\*\*/g,"^").replace(/\//g,"÷").replace(/\*/g,"×"); }

function allClear() { expr=""; input="0"; resultShown=false; document.getElementById("exprLine").textContent=""; updateDisplay(); }
function backspace() { if(resultShown){allClear();return;} input=input.length>1?input.slice(0,-1):"0"; updateDisplay(); }
function negate() { if(input!=="0"){ input=input.startsWith("-")?input.slice(1):"-"+input; updateDisplay(); } }
function percent() { try{ input=String(Math.round(parseFloat(input)/100*1e10)/1e10); updateDisplay(); }catch(e){} }

function sci(fn) {
  try {
    const v = parseFloat(input);
    const ops = { sin: Math.sin(v*Math.PI/180), cos: Math.cos(v*Math.PI/180), tan: Math.tan(v*Math.PI/180), log: Math.log10(v), "√": Math.sqrt(v), "x²": v*v };
    const res = Math.round(ops[fn]*1e10)/1e10;
    document.getElementById("exprLine").textContent = fn+"("+input+")";
    input = Number.isInteger(res)?String(res):String(res);
    resultShown = true; pulse(); updateDisplay();
  } catch(e) { document.getElementById("mainLine").textContent = "Error"; }
}

function pi() { input = String(Math.round(Math.PI*1e8)/1e8); resultShown=false; updateDisplay(); }

// ── Display ────────────────────────────────────────
function updateDisplay() {
  const el = document.getElementById("mainLine");
  const txt = input || "0";
  el.textContent = txt;
  el.style.fontSize = txt.length <= 8 ? "52px" : txt.length <= 13 ? "34px" : "22px";
}

function pulse() {
  const d = document.getElementById("display");
  const t = THEMES[themeIdx];
  d.style.background = t.accent;
  setTimeout(() => { d.style.background = t.disp; }, 180);
}

function shake() {
  const w = document.getElementById("calcWrap");
  const offsets = [10,-10,7,-7,4,-4,0];
  offsets.forEach((o,i) => setTimeout(() => w.style.transform=`translateX(${o}px)`, i*30));
  setTimeout(() => w.style.transform="", offsets.length*30);
}

// ── Mode toggle ────────────────────────────────────
function toggleMode() {
  sciMode = !sciMode;
  document.getElementById("std-lbl").classList.toggle("active", !sciMode);
  document.getElementById("sci-lbl").classList.toggle("active", sciMode);
  applyTheme(); buildKeypad();
}

// ── History ────────────────────────────────────────
function addHistory(expr, result) {
  history.unshift({ expr, result, ts: new Date().toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"}) });
}

function toggleHistory() {
  document.getElementById("histOverlay").classList.toggle("open");
  renderHistory();
}

function closeHistIfOutside(e) {
  if (e.target === document.getElementById("histOverlay")) toggleHistory();
}

function clearHistory() { history = []; renderHistory(); }

function renderHistory() {
  const q = document.getElementById("histSearch").value.toLowerCase();
  const list = document.getElementById("histList");
  const shown = q ? history.filter(h => h.expr.toLowerCase().includes(q) || h.result.toLowerCase().includes(q)) : history;
  if (!shown.length) { list.innerHTML = '<div class="hist-empty">No history yet</div>'; return; }
  list.innerHTML = shown.map((h,i) => `
    <div class="hist-item" onclick="reuseHistory('${h.result}')">
      <span class="hi-time">${h.ts}</span>
      <div class="hi-expr">${h.expr}</div>
      <div class="hi-result">${h.result}</div>
    </div>`).join("");
}

function reuseHistory(val) {
  input = val; expr = val; resultShown = true;
  updateDisplay(); toggleHistory();
}

// ── Keyboard ───────────────────────────────────────
function handleKey(e) {
  const k = e.key;
  if ("0123456789.".includes(k)) digit(k);
  else if (k==="+") op("+");
  else if (k==="-") op("−");
  else if (k==="*") op("×");
  else if (k==="/") { e.preventDefault(); op("÷"); }
  else if (k==="Enter"||k==="=") evaluate();
  else if (k==="Backspace") backspace();
  else if (k==="%") percent();
  else if (k==="Escape") allClear();
}

init();
</script>
</body>
</html>
